version: '3.8'

services:
  remani-bot:
    build: .
    container_name: remani-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - TZ=UTC
      - LAVALINK_URL=localhost:2333
      - LAVALINK_PASSWORD=remani-lavalink
      - YOUTUBE_OAUTH_REFRESH_TOKEN=${YOUTUBE_OAUTH_REFRESH_TOKEN}
      - JAVA_TOOL_OPTIONS=-Xms300m -Xmx300m
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node src/index.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
