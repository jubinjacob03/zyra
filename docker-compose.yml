version: "3.8"

services:
  remani-bot:
    build: .
    container_name: remani-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./cookies.txt:/app/cookies.txt
    environment:
      - NODE_ENV=production
      - TZ=UTC
      - YTDL_NO_UPDATE=1
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node src/index.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Network mode
    network_mode: bridge
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
