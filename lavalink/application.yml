server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      snapshot: false
  server:
    password: "remani-lavalink"
    bufferDurationMs: 1000
    frameBufferDurationMs: 20000
    nonAllocatingFrameBuffer: false
    opusEncodingQuality: 3
    resamplingQuality: LOW
    trackStuckThresholdMs: 15000
    useSeekGhosting: true
    playerUpdateInterval: 10
    gc-warnings: false
    youtubePlaylistLoadLimit: 30
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: false
      vimeo: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: false
      rotation: true
      channelMix: true
      lowPass: false
    timeouts:
      connectTimeoutMs: 15000
      connectionRequestTimeoutMs: 15000
      socketTimeoutMs: 15000 # Increased for yt-cipher compatibility

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - WEB
      - WEBEMBEDDED
      - MUSIC
      - ANDROID_MUSIC
      - TV
      - TVHTML5_SIMPLY
    clientOptions:
      WEB:
        playback: true
        videoLoading: true
        playlistLoading: true
        searching: true
      WEBEMBEDDED:
        playback: true
        videoLoading: true
        playlistLoading: false
        searching: false
      MUSIC:
        playback: true
        videoLoading: true
        playlistLoading: false
        searching: true
      ANDROID_MUSIC:
        playback: true
        videoLoading: true
        playlistLoading: false
        searching: false
      TV:
        playback: true
        videoLoading: true
        playlistLoading: false
        searching: false
      TVHTML5_SIMPLY:
        playback: true
        videoLoading: true
        playlistLoading: true
        searching: true
    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "remani-bot"
    # OAuth is deprecated by YouTube (see issue #78) and conflicts with remoteCipher
    # Use EITHER OAuth OR remoteCipher (not both) - remoteCipher is more reliable
    oauth:
      enabled: false
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"
      skipInitialization: true

  lavasrc:
    providers:
      - 'ytmsearch:"%ISRC%"'
      - "ytmsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: false

logging:
  level:
    root: WARN
    lavalink: INFO
    dev.lavalink.youtube.http.YoutubeOauth2Handler: DEBUG
