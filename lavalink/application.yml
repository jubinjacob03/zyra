server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      snapshot: false
  server:
    password: "remani-lavalink"
    bufferDurationMs: 1000
    frameBufferDurationMs: 20000
    nonAllocatingFrameBuffer: false
    opusEncodingQuality: 3
    resamplingQuality: LOW
    trackStuckThresholdMs: 15000
    useSeekGhosting: true
    playerUpdateInterval: 10
    gc-warnings: false
    youtubePlaylistLoadLimit: 30
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: false
      vimeo: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: false
      rotation: true
      channelMix: true
      lowPass: false
    timeouts:
      connectTimeoutMs: 15000
      connectionRequestTimeoutMs: 15000
      socketTimeoutMs: 15000 # Increased for yt-cipher compatibility

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - ANDROID_VR        # High reliability, good for age-restricted content
      - WEB               # PoToken supported
      - WEBEMBEDDED       # Embedded player fallback
      - IOS               # Different restriction policies
      - ANDROID_MUSIC     # Android music client
      - TVHTML5_SIMPLY    # New stable TV client (v1.18.0)
      - MUSIC             # Search-only client
    clientOptions:
      ANDROID_VR:
        playback: true
        videoLoading: true
        playlistLoading: true
        searching: true
      WEB:
        playback: true
        videoLoading: true
        playlistLoading: true
        searching: true
      WEBEMBEDDED:
        playback: true
        videoLoading: true
        playlistLoading: false
        searching: false
      IOS:
        playback: true
        videoLoading: true
        playlistLoading: true
        searching: true
      ANDROID_MUSIC:
        playback: true
        videoLoading: true
        playlistLoading: false
        searching: false
      TVHTML5_SIMPLY:
        playback: true
        videoLoading: true
        playlistLoading: true
        searching: true
      MUSIC:
        playback: false
        videoLoading: true
        playlistLoading: false
        searching: true
    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "remani-bot"
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"
      skipInitialization: false

  lavasrc:
    providers:
      - 'ytmsearch:"%ISRC%"'
      - "ytmsearch:%QUERY%"
      - "ytsearch:%QUERY%"  # Added yt-dlp fallback
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
      ytdlp: true  # Enable yt-dlp for age-restricted content
    ytdlp:
      enabled: true
      path: "yt-dlp"
      searchLimit: 10
      playlistLoadLimit: 1000
      customPlaybackArgs: ["-q", "--no-warnings", "-f", "bestaudio[ext=webm]/bestaudio", "--no-playlist", "--geo-bypass"]
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: false

logging:
  level:
    root: WARN
    lavalink: INFO
    dev.lavalink.youtube.http.YoutubeOauth2Handler: DEBUG
