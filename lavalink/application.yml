server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
      snapshot: false
  server:
    password: "remani-lavalink"
    # === BUFFER SETTINGS (anti-stutter) ===
    bufferDurationMs: 5000           # NAS native UDP buffer: 5s (default 400ms). Survives GC pauses.
    frameBufferDurationMs: 30000     # 30s of decoded opus frames pre-buffered (default 5000ms)
    nonAllocatingFrameBuffer: true   # Reduce GC pressure from frame allocations
    # === CPU REDUCTION ===
    opusEncodingQuality: 0           # Lowest CPU for encoding (only matters during filter/transcode, not passthrough)
    resamplingQuality: LOW           # Minimum CPU resampling
    # === TOLERANCE ===
    trackStuckThresholdMs: 30000     # 30s before declaring track stuck
    useSeekGhosting: false           # Don't drain buffer on seek (cleaner, less CPU)
    playerUpdateInterval: 10         # Position updates every 10s
    gc-warnings: false               # Disable GC monitoring overhead
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: false                  # Disabled: not used, saves memory
      vimeo: false                   # Disabled: not used, saves memory
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: false              # Disabled: not used by /filter command
      rotation: true
      channelMix: true
      lowPass: false                 # Disabled: not used by /filter command
    # === HTTP TIMEOUTS (faster retries on stalled YouTube requests) ===
    timeouts:
      connectTimeoutMs: 5000
      connectionRequestTimeoutMs: 3000
      socketTimeoutMs: 5000

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Client order optimized: MUSIC (search), then lightest playback clients first
    # TVHTML5_SIMPLY: no PoToken/OAuth needed, returns native Opus, lowest overhead
    # WEB: fallback, needs PoToken for some videos
    # TV removed: requires OAuth sign-in overhead, unnecessary with TVHTML5_SIMPLY
    clients:
      - MUSIC
      - TVHTML5_SIMPLY
      - WEB
    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "remani-bot"
    pot:
      token: "${YOUTUBE_POTOKEN:}"
      visitorData: "${YOUTUBE_VISITOR_DATA:}"
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"

  lavasrc:
    providers:
      - 'ytmsearch:"%ISRC%"'
      - "ytmsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6

logging:
  level:
    root: WARN                       # Reduce logging I/O
    lavalink: INFO
