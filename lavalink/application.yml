server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
      snapshot: false
  server:
    password: "remani-lavalink"
    bufferDurationMs: 5000
    frameBufferDurationMs: 30000
    nonAllocatingFrameBuffer: true
    opusEncodingQuality: 0
    resamplingQuality: LOW
    trackStuckThresholdMs: 30000
    useSeekGhosting: false
    playerUpdateInterval: 10
    gc-warnings: false
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: false
      vimeo: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: false
      rotation: true
      channelMix: true
      lowPass: false
    timeouts:
      connectTimeoutMs: 5000
      connectionRequestTimeoutMs: 3000
      socketTimeoutMs: 5000

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - TVHTML5_SIMPLY
      - WEB
    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "remani-bot"
    pot:
      token: "${YOUTUBE_POTOKEN:}"
      visitorData: "${YOUTUBE_VISITOR_DATA:}"
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"

  lavasrc:
    providers:
      - 'ytmsearch:"%ISRC%"'
      - "ytmsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6

logging:
  level:
    root: WARN
    lavalink: INFO
